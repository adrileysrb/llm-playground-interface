<router-outlet />
<div class="d-flex flex-row min-vh-100">
  <div class="col-9">
    <div *ngIf="carregando" class="alert d-flex align-items-center gap-2 m-0 rounded-0 m-3"
         [ngClass]="demorandoMais ? 'alert-warning' : 'alert-info'">
      <div class="spinner-border spinner-border-sm"></div>
      {{ demorandoMais ? 'Levando mais tempo que o esperado...' : 'Aguardando resposta...' }}
    </div>
    <div class="card mx-3" style="height: calc(100vh - 80px)">
      <div class="card-body d-flex flex-column overflow-hidden">

        <!-- histórico -->
        <div #chatHistorico class="flex-grow-1 overflow-auto p-3 bg-light border rounded mb-2" style="min-height: 0">

          <div *ngFor="let msg of mensagens"
               class="d-flex flex-column mb-2"
               [ngClass]="msg.origem === 'usuario' ? 'align-items-end' : 'align-items-start'">

            <div class="rounded p-2"
                 [ngClass]="msg.origem === 'usuario' ? 'bg-primary text-white' : 'bg-white border'"
                 style="max-width: 75%">
              {{ msg.texto }}
            </div>

            <div *ngIf="msg.raciocinio" style="max-width: 75%">
              <button class="btn btn-link btn-sm p-0 text-secondary"
                      (click)="msg.mostrarRaciocinio = !msg.mostrarRaciocinio">
                {{ msg.mostrarRaciocinio ? '▲ Ocultar raciocínio' : '▼ Ver raciocínio' }}
              </button>
              <div *ngIf="msg.mostrarRaciocinio"
                   class="bg-light border rounded p-2 mt-1 text-muted fst-italic small">
                {{ msg.raciocinio }}
              </div>
            </div>

          </div>

        </div>

        <!-- input + botão -->
        <div class="d-flex gap-2 align-items-end">
          <textarea #inputArea
                    class="form-control"
                    placeholder="Digite sua mensagem... (Ctrl+Enter para enviar)"
                    [(ngModel)]="inputTexto"
                    (input)="ajustarAltura(inputArea)"
                    (keydown.control.enter)="enviar(inputArea)"
                    rows="1"
                    style="resize: none; overflow-y: auto; max-height: 150px"></textarea>
          <button class="btn btn-primary" (click)="enviar(inputArea)">Enviar</button>
        </div>

      </div>
    </div>
  </div>
  <div class="col-3">
    <div class="card h-100">
      <div class="card-body bg-success">
        <div class="mb-3">
          <label class="form-label">Modelo</label>
          <select class="form-select">
            <option value="gpt-4">GPT-4</option>
            <option value="gpt-3.5">GPT-3.5</option>
            <option value="llama">Llama</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Prompt Sistema:</label>
          <textarea class="form-control" rows="10" placeholder="Digite aqui..."></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Temperature</label>
          <input type="number" class="form-control" min="0" max="2" step="0.1" placeholder="0.7" />
        </div>

        <button class="btn btn-primary w-100">Aplicar</button>
      </div>
    </div>
  </div>
</div>
